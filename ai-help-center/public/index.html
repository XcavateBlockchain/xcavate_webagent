<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local AI Help Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div class="hero-top-row">
          <h1>Ask me anything!</h1>
          <button class="pill-btn dark" type="button">Message</button>
        </div>
        <form id="ask-form" class="ask-form" autocomplete="off">
          <label class="visually-hidden" for="prompt-input">Ask your question</label>
          <input
            id="prompt-input"
            name="prompt"
            type="text"
            placeholder="Ask your question, like 'How do I connect my wallet?'"
            required
          />
        </form>
      </section>

      <section id="chat-section" class="chat-section hidden" aria-live="polite">
        <div id="chat-transcript" class="chat-transcript"></div>
      </section>

      <section id="content-section" class="content-section">
        <section>
          <h2 class="section-label">Self Service</h2>
          <div class="service-grid">
            <button class="service-card preset-prompt" type="button" data-prompt="How can I recover my account?">
              <span class="icon-circle" aria-hidden="true"></span>
              <span>How can I recover my account?</span>
            </button>
            <button class="service-card preset-prompt" type="button" data-prompt="Where can I see my transaction history?">
              <span class="icon-circle" aria-hidden="true"></span>
              <span>Where can I see my transaction history?</span>
            </button>
            <button class="service-card preset-prompt" type="button" data-prompt="I need help with a failed transaction">
              <span class="icon-circle" aria-hidden="true"></span>
              <span>I need help with a failed transaction</span>
            </button>
            <button class="service-card preset-prompt" type="button" data-prompt="What is KYC and how do I complete it?">
              <span class="icon-circle" aria-hidden="true"></span>
              <span>What is KYC and how do I complete it?</span>
            </button>
          </div>
          <button class="pill-btn light" type="button">View All</button>
        </section>

        <section class="panels-wrap">
          <article class="info-panel">
            <h3>Account &amp; Security</h3>
            <ul>
              <li><button type="button" class="text-link preset-prompt" data-prompt="How do I reset my password?">How do I reset my password?</button></li>
              <li><button type="button" class="text-link preset-prompt" data-prompt="How can I change my email?">How can I change my email?</button></li>
              <li><button type="button" class="text-link preset-prompt" data-prompt="How do I enable two-factor authentication?">How do I enable two-factor authentication?</button></li>
            </ul>
          </article>
          <article class="info-panel">
            <h3>Transactions</h3>
            <ul>
              <li><button type="button" class="text-link preset-prompt" data-prompt="How do I check my balance?">How do I check my balance?</button></li>
              <li><button type="button" class="text-link preset-prompt" data-prompt="Where can I review recent transfers?">Where can I review recent transfers?</button></li>
              <li><button type="button" class="text-link preset-prompt" data-prompt="How do I track a pending transaction?">How do I track a pending transaction?</button></li>
            </ul>
          </article>
        </section>

        <section class="faq-wrap">
          <h3>FAQ</h3>
          <ul>
            <li><button type="button" class="text-link preset-prompt" data-prompt="I can't connect my wallet - help?">I can't connect my wallet - help?</button></li>
            <li><button type="button" class="text-link preset-prompt" data-prompt="Why is my token claim delayed?">Why is my token claim delayed?</button></li>
            <li><button type="button" class="text-link preset-prompt" data-prompt="Where can I see pending actions?">Where can I see pending actions?</button></li>
          </ul>
        </section>
      </section>
    </main>

    <template id="message-template">
      <div class="message-row">
        <div class="avatar"></div>
        <p class="bubble"></p>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
