<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xCavate Web Assistent</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js" 
            integrity="sha512-H+rglffZ6f5gF7UJgvH4Naa+fGCgjrHKMgoFOGmcPTRwR6oILo5R+gtzNrpDp7iMV3udbymBVjkeZGNz1Em4rQ==" 
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
     <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" 
            integrity="sha256-Pn59f+s+XVjLbIBPaKtcJMx+XrYnD9bly7kSRzkhfQw=" 
            crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/style.css">

</head>
<!-- Complete body content in index.html -->
<body>
    <div class="app-layout">
        <div class="sidebar-controls">                            
        <nav id="history-sidebar">
            <ul id="chat-history-list"></ul>
        </nav>
        </div>
        <div class="chat-container">
            <header>
                <div class="sidebar-header">       
                <button id="toggle-sidebar-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="3" rx="2"></rect>
                        <path d="M9 3v18"></path>
                    </svg>
                </button>
                <button id="new-chat-btn">+ <span class="button-text">New Chat</span></button>                                      
            </div>                                                                                                                  
            <h1>Chat with <span id="model-name-span"></span></h1>
            </header>
            <div id="chat-log"></div>
            <div id="attachment-container" class="attachment-container"></div>
            <div id="drop-zone" style="display: none;">
                <div class="drop-zone-text">Drag a text file here to attach it</div>
            </div>
            <div class="chat-input-area">
                <div class="metrics-container">
                    <div class="token-counter-container">
                        <div class="token-progress-bar"><div id="token-progress-bar-inner"></div></div>
                        <span id="token-count-text">0 / 8,192 tokens</span>
                    </div>
                </div>
                <form id="chat-form">
                    <div class="prompt-input-wrapper">
                        <input type="file" id="file-input" style="display: none;" multiple accept="text/*">
                        <button type="button" id="attach-button" title="Attach file">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.03 2.47 5.5 5.5 5.5s5.5-2.47 5.5-5.5V6h-1.5z"/></svg>
                        </button>
                        <textarea id="prompt-input" placeholder="Type your message..." autocomplete="off" rows="1" style="resize: none; overflow-y: auto; max-height: 220px;"></textarea>
                    </div>
                    <button type="submit" id="send-button">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                    <button type="button" id="cancel-button" style="display: none; border-radius: 100%;">Cancel</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Load JS module at the end -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
